apiVersion: apps/v1
kind: Deployment
metadata:
  name: docuquery
  labels:
    app: docuquery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docuquery
  template:
    metadata:
      labels:
        app: docuquery
    spec:
      containers:
      - name: docuquery
        image: docuquery:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: docuquery-secrets
              key: google-api-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 20
